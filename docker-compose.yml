services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    ports:
      - '4000:4000'
    environment:
      PORT: 4000

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend
