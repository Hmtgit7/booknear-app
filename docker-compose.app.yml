# App stack for local container testing (AWS-ready baseline).
# Includes infra + backend, and optional frontend app via profile.
#
# Examples:
#   docker compose -f docker-compose.app.yml up -d backend
#   docker compose -f docker-compose.app.yml --profile frontend up -d

services:
  mongo:
    image: mongo:7.0
    container_name: docnear_app_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: docnear
      MONGO_INITDB_ROOT_PASSWORD: docnear_dev_password
      MONGO_INITDB_DATABASE: docnear
    volumes:
      - docnear_app_mongo_data:/data/db
    networks:
      - docnear_app_network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7.2-alpine
    container_name: docnear_app_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - docnear_app_redis_data:/data
    networks:
      - docnear_app_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    image: docnear/backend:local
    container_name: docnear_app_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: mongodb://docnear:docnear_dev_password@mongo:27017/docnear?authSource=admin
      JWT_SECRET: docnear_local_jwt_secret
      JWT_REFRESH_SECRET: docnear_local_jwt_refresh_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: http://localhost:3000
    networks:
      - docnear_app_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    image: docnear/frontend:local
    container_name: docnear_app_frontend
    restart: unless-stopped
    profiles: ['frontend']
    depends_on:
      backend:
        condition: service_started
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    networks:
      - docnear_app_network

volumes:
  docnear_app_mongo_data:
    driver: local
  docnear_app_redis_data:
    driver: local

networks:
  docnear_app_network:
    driver: bridge
